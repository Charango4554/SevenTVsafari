name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir public
          cp index.html public/index.html
          touch public/.nojekyll
          mkdir -p public/seventv-injector/dist
          cp seventv-injector/dist/seventv.js public/seventv-injector/dist/seventv.js
          cp seventv-injector/dist/seventv.css public/seventv-injector/dist/seventv.css

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
